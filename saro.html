<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog Platform</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#007bff;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    margin:20px auto;
}

.blog-post{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.blog-post h2{
    color:#333;
    margin-bottom:10px;
}

.blog-post p{
    color:#555;
    line-height:1.6;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.comments{
    margin-top:20px;
}

.comments h3{
    margin-bottom:10px;
}

.comment{
    background:#f1f1f1;
    padding:10px;
    border-radius:5px;
    margin-bottom:10px;
}

textarea{
    width:100%;
    height:80px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    margin-top:10px;
}

footer{
    text-align:center;
    background:#333;
    color:white;
    padding:15px;
    margin-top:20px;
}

@media(max-width:600px){
    .container{
        width:95%;
    }
}
</style>
</head>

<body>

<header>
    <h1>Blog Platform with Comments</h1>
</header>

<div class="container">

    <div class="blog-post">
        <h2>My First Blog Post</h2>
        <p>
            Welcome to my blog platform. Users can create, edit,
            and delete blog posts and interact through comments.
        </p>

        <button class="btn">Edit</button>
        <button class="btn">Delete</button>

        <div class="comments">
            <h3>Comments</h3>

            <div class="comment">
                Great article! Thanks for sharing.
            </div>

            <div class="comment">
                Very informative and easy to understand.
            </div>

            <textarea placeholder="Write a comment..."></textarea>
            <button class="btn">Post Comment</button>
        </div>
    </div>

</div>

<footer>
    <p>&copy; 2026 Blog Platform</p>
</footer>

</body>
</html>
